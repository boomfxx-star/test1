<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>自定義小說模擬器</title>
</head>
<body>
    <div id="chat-container">
        <h2>小說模擬器核心終端</h2>
        
        <div id="setup-panel">
            <input type="password" id="apiKey" placeholder="🔑 輸入你的 Google API Key">
            
            <select id="modelSelect">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (最新推荐)</option>
                <option value="gemini-2.0-flash">Gemini 2.0 Flash (高速稳定)</option>
                <option value="gemini-1.5-flash">Gemini 3 Flash (经典备用)</option>
                <option value="gemini-1.5-pro">Gemini 3.5 Flash (逻辑极强/速度稍慢)</option>
                <option value="gemini-1.5-pro">Gemini 3.1 Flash-Lite (逻辑极强/速度稍慢)</option>
                <option value="gemini-1.5-pro">Gemini 3.1 Pro (逻辑极强/速度稍慢)</option>
            </select>

            <div class="setup-title">👤 玩家身份設定</div>
            <textarea id="setupPlayer" placeholder="扮演什麼角色？外貌衣著？">主人（女性Futa，擁有100%精緻的女性外貌、嗓音與完美傲人身段，唯獨私密部位具備雄性構造）。深色便服，袖口卷到小臂。站在庭院中看著新來的女仆。</textarea>

            <div class="setup-title">👩 NPC及私密初始設定</div>
            <textarea id="setupNpc" placeholder="對方是誰？當前狀態、衣著、私密處狀態？">艾拉，新來的女仆。領口拉到最高的女仆裝。指尖掐進掌心。心理：身體被修好了意味著被使用，在等指令。私密狀態：口腔溫熱、胸部衣物遮蓋、小穴處子（魔法修復）、後穴未使用。</textarea>

            <div class="setup-title">🗺️ 故事背景與開場舞台</div>
            <textarea id="setupPlot" placeholder="故事在哪裡開始？發生了什麼前因？">北境·灰石堡庭院。傍晚的海風帶著鹽和冷松針的氣味。賣家的人剛用治愈魔法覆蓋了艾拉全身，抹去了所有舊傷和初夜勒痕。她又成了處子，站在庭院中央等待主人的命令。</textarea>

            <button id="startBtn" onclick="startGame()">✨ 注入因果，創造世界</button>
        </div>

        <div id="output" style="display: none;"></div>
        
        <div class="control-box" style="display: none;">
            <textarea id="userInput" placeholder="輸入 A/B/C/D 或自定義你的下一步行動..."></textarea>
            <button onclick="sendMessage()">推演劇情</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
