<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>小说模拟器</title>
</head>
<body>
    <div id="chat-container">
        <h2>小说模拟器终端</h2>
        <input type="password" id="apiKey" placeholder="输入你的 Google API Key">
        <div id="output">
            <div class="msg model-msg">【系统提示】欢迎来到灰石堡模拟器。请输入你的初始设定或第一步行动开始游戏...</div>
        </div>
        <textarea id="userInput" placeholder="输入你的行动或指令..."></textarea>
        <button onclick="sendMessage()">推演剧情</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
